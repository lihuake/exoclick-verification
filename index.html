<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global CDN Gateway - Secure Access</title>
    <style>
        :root { --p-blue: #007AFF; --bg: #0a0a0a; --card: #1c1c1e; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; max-width: 400px; width: 90%; padding: 45px 30px; background: var(--card); border-radius: 24px; border: 1px solid #2c2c2e; box-shadow: 0 20px 60px rgba(0,0,0,0.7); }
        .badge { display: inline-block; padding: 5px 12px; background: rgba(48, 209, 88, 0.15); color: #30d158; border-radius: 20px; font-size: 11px; font-weight: bold; margin-bottom: 20px; letter-spacing: 0.5px; }
        h1 { font-size: 22px; margin-bottom: 12px; font-weight: 600; letter-spacing: -0.5px; }
        p { color: #a1a1a6; font-size: 15px; line-height: 1.5; margin-bottom: 35px; }
        
        /* 核心蓝色按钮 */
        .btn-main { 
            background: var(--p-blue); color: #fff; padding: 18px; border-radius: 14px; 
            font-size: 17px; font-weight: 600; width: 100%; border: none; cursor: pointer; 
            transition: all 0.2s ease; box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
            display: block; outline: none;
        }
        .btn-main:active { transform: scale(0.97); background: #005ecb; }
        .btn-main:hover { filter: brightness(1.1); }

        /* 进度条动画 */
        .prog-area { display: none; margin-top: 30px; text-align: left; }
        .prog-header { display: flex; justify-content: space-between; font-size: 12px; color: #86868b; margin-bottom: 8px; }
        .bar-outer { width: 100%; height: 6px; background: #333; border-radius: 10px; overflow: hidden; }
        .bar-inner { width: 0%; height: 100%; background: var(--p-blue); transition: width 0.3s ease; }
        
        .footer-info { margin-top: 25px; font-size: 11px; color: #48484a; }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge" id="nodeInfo">DE-US-UK NODE ACTIVE</div>
        <h1>Connection Protocol</h1>
        <p>Accessing <b>Lite Mirror Service</b>. Please synchronize your session with the secure node to continue.</p>
        
        <button class="btn-main" id="triggerBtn">Synchronize & Enter</button>

        <div class="prog-area" id="progressBox">
            <div class="prog-header">
                <span id="statusMsg">Initializing Handshake...</span>
                <span id="percVal">0%</span>
            </div>
            <div class="bar-outer"><div class="bar-inner" id="barFill"></div></div>
        </div>

        <div class="footer-info">© 2026 Global Edge Network. All rights reserved.</div>
    </div>

    <script type="application/javascript">
    (function() {
        // --- 1. 配置参数 ---
        var adConfig = {
            "ads_host": "a.pemsrv.com",
            "syndication_host": "s.pemsrv.com",
            "idzone": 5873154,
            "popup_fallback": true,
            "popup_force": true, // 桌面端必须强制触发
            "chrome_enabled": true,
            "new_tab": true,
            "frequency_period": 30, // 30分钟频率
            "frequency_count": 1,
            "trigger_method": 1, // 关键：点击触发
            "trigger_class": "btn-main" // 绑定按钮类名
        };

        // --- 2. ExoClick 库逻辑 (为了防止报错，我保留了必要的 popMagic 结构) ---
        // (此处省略了混淆的几百行库代码，但在部署时请确保 popMagic 逻辑存在)
        // 建议使用你之前代码中的 (function(){ ... })(); 完整逻辑
        // 为方便复制，我这里直接使用简化调用的逻辑接口
        
        /* 粘贴你之前代码中从 function randStr 到 popup 方法结束的所有内容 */
        // ... (此处即为你提供的长脚本内容) ...
        
        // --- 3. 页面交互深度优化逻辑 ---
        const btn = document.getElementById('triggerBtn');
        const pBox = document.getElementById('progressBox');
        const fill = document.getElementById('barFill');
        const perc = document.getElementById('percVal');
        const stat = document.getElementById('statusMsg');

        btn.addEventListener('click', function(e) {
            // 按钮禁用防止二次点击
            btn.style.opacity = '0.5';
            btn.style.pointerEvents = 'none';
            btn.innerHTML = "Opening Secure Link...";

            // 显示进度条
            pBox.style.display = 'block';
            let p = 0;
            let timer = setInterval(() => {
                p += Math.floor(Math.random() * 12) + 1;
                if (p >= 100) {
                    p = 100;
                    clearInterval(timer);
                    
                    // 核心反馈：弹窗。
                    // 1. 强制用户点一下，这会把被广告切走的标签页焦点拉回来。
                    // 2. 对于没出广告的用户，这是个进入确认。
                    setTimeout(() => {
                        alert("Secure Handshake Successful. Click OK to proceed.");
                        btn.style.opacity = '1';
                        btn.style.pointerEvents = 'auto';
                        btn.innerHTML = "Re-enter Lite Mirror";
                        btn.style.background = "#30d158"; // 成功后变绿
                    }, 500);
                }
                fill.style.width = p + '%';
                perc.innerHTML = p + '%';
                
                if(p > 40 && p < 70) stat.innerHTML = "Authenticating US Node...";
                if(p > 70) stat.innerHTML = "Redirecting to Assets...";
            }, 300);
        });
    })();
    </script>
    
    </body>
</html>
