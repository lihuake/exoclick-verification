<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="monetag" content="2ee04f0e5821abb2369342f4655af22a">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdgeSync | Network Handshake</title>
    <style>
        :root { --p-blue: #007AFF; --bg: #050505; --card: #1c1c1e; --text: #f5f5f7; }
        body, html { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; -webkit-font-smoothing: antialiased; }
        
        .container { text-align: center; width: 90%; max-width: 380px; padding: 40px 24px; background: var(--card); border-radius: 28px; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .icon-box { width: 64px; height: 64px; background: rgba(0,122,255,0.15); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; border: 1px solid rgba(0,122,255,0.3); }
        
        h1 { font-size: 24px; font-weight: 600; margin: 0 0 12px 0; letter-spacing: -0.02em; }
        p { color: #8e8e93; font-size: 15px; line-height: 1.4; margin-bottom: 32px; }
        
        .btn-main { background: var(--p-blue); color: #fff; padding: 16px; border-radius: 14px; font-size: 17px; font-weight: 600; width: 100%; border: none; cursor: pointer; transition: all 0.2s ease; outline: none; -webkit-tap-highlight-color: transparent; }
        .btn-main:active { transform: scale(0.97); background: #0062cc; }

        .loading-area { display: none; margin-top: 30px; }
        .status-text { font-size: 12px; color: var(--p-blue); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: left; }
        .progress-track { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--p-blue); transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1); }
        
        .footer-tag { margin-top: 24px; font-size: 11px; color: #444; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <h1>Synchronize Node</h1>
        <p>Establish a secure tunnel to the closest high-speed edge relay for optimized data throughput.</p>
        
        <button class="btn-main" id="syncBtn">Connect to Edge Node</button>

        <div class="loading-area" id="loadingArea">
            <div class="status-text" id="statusMsg">Initializing...</div>
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        
        <div class="footer-tag">SECURE HANDSHAKE v4.2 // MAIN-NET</div>
    </div>

    <script>
        // 这里替换成你在 Monetag 后台生成的 Direct Link
        const MONETAG_DIRECT_LINK = "https://omg10.com/4/10741871"; 

        const btn = document.getElementById('syncBtn');
        const loadingArea = document.getElementById('loadingArea');
        const progressBar = document.getElementById('progressBar');
        const statusMsg = document.getElementById('statusMsg');

        const techTerms = [
            "Initializing handshake...",
            "Requesting edge route...",
            "Validating certificate...",
            "Optimizing TLS tunnel...",
            "Synchronizing mirror assets...",
            "Finalizing connection..."
        ];

        btn.addEventListener('click', () => {
            // 界面切换
            btn.style.display = 'none';
            loadingArea.style.display = 'block';

            let progress = 0;
            let termIndex = 0;

            const interval = setInterval(() => {
                // 模拟更真实的随机进度增长
                progress += Math.floor(Math.random() * 15) + 5;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    statusMsg.innerText = "Connection Established!";
                    
                    // 延迟 0.5 秒后跳转，给用户一种“握手成功”的确定感
                    setTimeout(() => {
                        window.location.href = MONETAG_DIRECT_LINK;
                    }, 500);
                }

                progressBar.style.width = progress + '%';
                
                // 动态更新技术术语
                if (progress > termIndex * 20 && termIndex < techTerms.length) {
                    statusMsg.innerText = techTerms[termIndex];
                    termIndex++;
                }

            }, 250);
        });
    </script>
</body>
</html>
